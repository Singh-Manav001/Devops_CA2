name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Code lao
        uses: actions/checkout@v3

      - name: Node.js setup karo
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Dependencies install karo
        run: npm install

      - name: Tests chalao
        run: npm test

      - name: Docker image banao
        run: docker build -t my-api .

      - name: Deploy karo
        run: echo 'Pipeline successful! Deploy ho gaya!'
